<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חלוקת קבוצות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ede8; --bg2: #e4e0d9; --card: #ffffff; --card2: #f7f5f2;
    --border: #d4cfc8; --text: #1a1714; --text2: #5a534e; --text3: #8a837e;
    --accent: #e84b2f; --accent2: #2f7de8; --accent3: #2db87a;
    --tag-bg: #ffe8e4; --tag-text: #c43020;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px; --radius-sm: 8px;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --bg: #131110; --bg2: #1d1b18; --card: #222019; --card2: #2a2823;
    --border: #38352f; --text: #f0ece6; --text2: #b0a99e; --text3: #6a635c;
    --accent: #ff6347; --accent2: #5b9df5; --accent3: #3dd68c;
    --tag-bg: #3d1a12; --tag-text: #ff8066;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background var(--transition), color var(--transition); }

  /* HEADER */
  header {
    background: var(--card); border-bottom: 2px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
  }
  header h1 { font-size: 21px; font-weight: 900; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  header h1 span { color: var(--accent); }
  .btn-icon {
    background: var(--card2); border: 1.5px solid var(--border); color: var(--text);
    border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-size: 17px; transition: all var(--transition);
  }
  .btn-icon:hover { background: var(--border); transform: scale(1.08); }

  /* CONTAINER */
  .container { max-width: 860px; margin: 0 auto; padding: 20px 20px 40px; }

  /* CARD */
  .card {
    background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
    padding: 18px 20px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 14px; }

  /* SETTINGS ROW */
  .settings-row { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  .ctrl-group { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-label { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .seg-btns { display: flex; gap: 8px; }
  .seg-btn {
    width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border);
    cursor: pointer; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700;
    background: var(--card2); color: var(--text2);
    display: flex; align-items: center; justify-content: center; transition: all var(--transition);
  }
  .seg-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }
  .seg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 3px 10px rgba(232,75,47,0.35); transform: scale(1.08); }

  /* GUEST */
  .guest-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .guest-input {
    flex: 1; min-width: 150px; padding: 9px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); background: var(--card2); color: var(--text);
    font-family: 'Heebo', sans-serif; font-size: 14px; transition: border-color var(--transition); outline: none;
  }
  .guest-input:focus { border-color: var(--accent2); }
  .checkbox-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); white-space: nowrap; }
  .checkbox-label input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .guest-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .guest-chip {
    display: flex; align-items: center; gap: 6px; padding: 5px 12px;
    background: var(--tag-bg); color: var(--tag-text); border-radius: 20px;
    font-size: 13px; font-weight: 600;
  }
  .guest-chip button { background: none; border: none; cursor: pointer; color: var(--tag-text); font-size: 14px; padding: 0; line-height: 1; opacity: 0.6; }
  .guest-chip button:hover { opacity: 1; }

  /* PLAYER LIST */
  .sel-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
    gap: 10px; margin-bottom: 12px;
  }
  .sel-count-wrap { display: flex; align-items: baseline; gap: 6px; }
  .sel-count { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); }
  .sel-label { font-size: 13px; color: var(--text2); }
  .btn-secondary {
    padding: 8px 18px; background: var(--card2); color: var(--text);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600; transition: all var(--transition);
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 7px; }
  .player-item {
    display: flex; align-items: center; gap: 8px; padding: 9px 13px;
    border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    background: var(--card2); cursor: pointer; transition: all var(--transition); user-select: none;
  }
  .player-item:hover { border-color: var(--accent); transform: translateY(-1px); }
  .player-item.selected { background: var(--tag-bg); border-color: var(--accent); color: var(--tag-text); }
  .player-check { font-size: 14px; opacity: 0; transition: opacity var(--transition); flex-shrink: 0; }
  .player-item.selected .player-check { opacity: 1; }
  .player-name { font-weight: 600; font-size: 14px; }

  /* SPLIT BUTTON */
  .split-btn-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
  .btn-primary {
    padding: 12px 32px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; font-family: 'Heebo', sans-serif;
    font-size: 15px; font-weight: 700; transition: all var(--transition); letter-spacing: 0.3px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(232,75,47,0.35); }
  .btn-primary:active { transform: translateY(0); }

  /* ALERT */
  .alert { padding: 11px 15px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; border: 1.5px solid; margin-bottom: 12px; }
  .alert-warn { background: #fff8e1; border-color: #f0c040; color: #7a6010; }
  .alert-info { background: #e8f4ff; border-color: #5b9df5; color: #1a4a90; }
  [data-theme="dark"] .alert-warn { background: #2a2200; border-color: #7a6010; color: #f0c040; }
  [data-theme="dark"] .alert-info { background: #0a1a30; border-color: #2f5a9a; color: #5b9df5; }

  /* TEAMS */
  .teams-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
  .team-card {
    background: var(--card); border-radius: var(--radius); border: 2px solid var(--border);
    overflow: hidden; box-shadow: var(--shadow); animation: slideUp 0.32s ease both;
  }
  .team-card:nth-child(2) { animation-delay: 0.07s; }
  .team-card:nth-child(3) { animation-delay: 0.14s; }
  @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .team-color-a .team-header { background: linear-gradient(135deg,#e84b2f22,#e84b2f08); border-bottom: 2px solid #e84b2f33; }
  .team-color-b .team-header { background: linear-gradient(135deg,#2f7de822,#2f7de808); border-bottom: 2px solid #2f7de833; }
  .team-color-c .team-header { background: linear-gradient(135deg,#2db87a22,#2db87a08); border-bottom: 2px solid #2db87a33; }
  .team-header { padding: 13px 16px; }
  .team-color-a .team-name { color: var(--accent); }
  .team-color-b .team-name { color: var(--accent2); }
  .team-color-c .team-name { color: var(--accent3); }
  .team-name { font-size: 16px; font-weight: 900; }
  .team-players { padding: 10px 14px; display: flex; flex-direction: column; gap: 5px; }
  .team-player-row {
    display: flex; align-items: center; gap: 9px; padding: 7px 11px;
    border-radius: var(--radius-sm); background: var(--card2); border: 1px solid var(--border);
    font-size: 14px; font-weight: 600; animation: fadeIn 0.25s ease both;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .team-player-row .pnum { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text3); min-width: 14px; }
  .extra-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--tag-bg); color: var(--tag-text); border: 1px solid var(--border); margin-right: auto; }

  /* BENCH */
  .bench-card { background: var(--card2); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 14px 18px; }
  .bench-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .bench-names { display: flex; flex-wrap: wrap; gap: 6px; }
  .bench-chip { padding: 4px 12px; background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text2); }

  @media (max-width: 560px) {
    .container { padding: 12px 12px 32px; }
    .player-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); }
    .settings-row { gap: 16px; }
  }
</style>
</head>
<body>
<header>
  <h1>⚽ חלוקת <span>קבוצות</span></h1>
  <button class="btn-icon" id="themeToggle" title="החלף ערכת צבעים">🌙</button>
</header>

<div class="container">

  <!-- SETTINGS -->
  <div class="card">
    <div class="card-title">הגדרות חלוקה</div>
    <div class="settings-row">
      <div class="ctrl-group">
        <span class="ctrl-label">מספר קבוצות</span>
        <div class="seg-btns" id="numTeamsCtrl">
          <button class="seg-btn active" data-val="2">2</button>
          <button class="seg-btn" data-val="3">3</button>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">שחקנים בקבוצה</span>
        <div class="seg-btns" id="perTeamCtrl">
          <button class="seg-btn" data-val="3">3</button>
          <button class="seg-btn active" data-val="4">4</button>
          <button class="seg-btn" data-val="5">5</button>
        </div>
      </div>
    </div>
  </div>

  <!-- GUEST -->
  <div class="card">
    <div class="card-title">➕ שחקן מזדמן</div>
    <div class="guest-row">
      <input class="guest-input" id="guestName" placeholder="שם השחקן..." />
      <label class="checkbox-label"><input type="checkbox" id="guestTall"> גבוה</label>
      <button class="btn-secondary" id="addGuestBtn">הוסף</button>
    </div>
    <div class="guest-chips" id="guestChips"></div>
  </div>

  <!-- PLAYER LIST -->
  <div class="card">
    <div class="card-title">בחר שחקנים</div>
    <div class="sel-bar">
      <div class="sel-count-wrap">
        <span class="sel-count" id="selCount">0</span>
        <span class="sel-label">נבחרו</span>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-secondary" id="selectAllBtn">בחר הכל</button>
        <button class="btn-secondary" id="clearSelBtn">נקה</button>
      </div>
    </div>
    <div class="player-grid" id="playerGrid"></div>
  </div>

  <!-- SPLIT BUTTON -->
  <div class="split-btn-wrap">
    <button class="btn-primary" id="splitBtn">⚡ חלק קבוצות</button>
    <div id="splitWarning"></div>
  </div>

  <!-- RESULT -->
  <div id="teamsResult" style="margin-top:16px;"></div>

</div>

<script>
// ════════════════════════════════════════════════
// PLAYERS — edit here freely
// rank: 1=best … higher=weaker, tall: true/false
// ════════════════════════════════════════════════
const BASE_PLAYERS = [
  { name: "עידו סידור",            rank: 1,  tall: false },
  { name: "מאור",            rank: 1,  tall: false },
  { name: "אלירן",           rank: 1,  tall: true  },
  { name: "שמואל",           rank: 1,  tall: true  },
  { name: "רן שושן",         rank: 1,  tall: true  },
  { name: "סתיו",            rank: 1,  tall: false },
  { name: "שמוליק",          rank: 1,  tall: true  },
  { name: "רונן",            rank: 1,  tall: false },
  { name: "גולן",            rank: 2,  tall: false },
  { name: "רז",              rank: 2,  tall: false },
  { name: "דניאל",           rank: 2,  tall: false },
  { name: "אבי",              rank: 2,  tall: false },
  { name: "אסף אברמזון",           rank: 2,  tall: false },
  { name: "חן",              rank: 2,  tall: false },
  { name: "לוטם",              rank: 2,  tall: false },
  { name: "אלעד",              rank: 2,  tall: false },
  { name: "עומר",            rank: 3,  tall: false },
  { name: "אסף מגריסו",           rank: 3,  tall: false },
  { name: "אלדד פישר",          rank: 3,  tall: false },
  { name: "יוני פרהדיאן",            rank: 3,  tall: false },
  { name: "עידו תורג'מן",    rank: 3,  tall: false },
  { name: "יוני לונדר",        rank: 3,  tall: true  },
  { name: "אלדד יוספוב",            rank: 3,  tall: false },
  { name: "מיכאל",           rank: 3,  tall: true  },
  { name: "אור",             rank: 3,  tall: false },
  { name: "עומרי",           rank: 4,  tall: false },
  { name: "תמיר",            rank: 4,  tall: true  },
  { name: "סער",             rank: 4,  tall: false },
  { name: "נתי",             rank: 4,  tall: false },
  { name: "שחר",             rank: 4,  tall: false },
  { name: "גיל",             rank: 4,  tall: true  },
  { name: "רן קליר",             rank: 4,  tall: true  },
  { name: "אחימאיר",         rank: 4,  tall: true  },
  { name: "טל",              rank: 4,  tall: false },
];

// ════════ STATE ════════
const players = BASE_PLAYERS.map((p, i) => ({ ...p, id: i }));
let selected = new Set();
let guests   = [];
let numTeams = 2;
let perTeam  = 4;

// ════════ THEME ════════
let dark = localStorage.getItem('theme') === 'dark';
applyTheme();
document.getElementById('themeToggle').addEventListener('click', () => {
  dark = !dark; applyTheme(); localStorage.setItem('theme', dark ? 'dark' : 'light');
});
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = dark ? '☀️' : '🌙';
}

// ════════ SETTINGS ════════
document.getElementById('numTeamsCtrl').addEventListener('click', e => {
  if (!e.target.dataset.val) return;
  numTeams = +e.target.dataset.val;
  document.querySelectorAll('#numTeamsCtrl .seg-btn').forEach(b => b.classList.toggle('active', +b.dataset.val === numTeams));
});
document.getElementById('perTeamCtrl').addEventListener('click', e => {
  if (!e.target.dataset.val) return;
  perTeam = +e.target.dataset.val;
  document.querySelectorAll('#perTeamCtrl .seg-btn').forEach(b => b.classList.toggle('active', +b.dataset.val === perTeam));
});

// ════════ GUESTS ════════
document.getElementById('addGuestBtn').addEventListener('click', addGuest);
document.getElementById('guestName').addEventListener('keydown', e => { if (e.key === 'Enter') addGuest(); });
function addGuest() {
  const name = document.getElementById('guestName').value.trim();
  if (!name) return;
  const tall = document.getElementById('guestTall').checked;
  guests.push({ name, tall, id: 'g_' + Date.now() });
  document.getElementById('guestName').value = '';
  document.getElementById('guestTall').checked = false;
  renderGuests(); updateCount();
}
function renderGuests() {
  const c = document.getElementById('guestChips');
  c.innerHTML = '';
  guests.forEach(g => {
    const el = document.createElement('div');
    el.className = 'guest-chip';
    el.innerHTML = `${g.name}${g.tall ? ' ↕️' : ''}<button data-id="${g.id}">✕</button>`;
    el.querySelector('button').addEventListener('click', () => {
      guests = guests.filter(x => x.id !== g.id);
      renderGuests(); updateCount();
    });
    c.appendChild(el);
  });
}

// ════════ PLAYER GRID ════════
function renderPlayerGrid() {
  const sorted = [...players].sort((a, b) => a.name.localeCompare(b.name, 'he'));
  const c = document.getElementById('playerGrid');
  c.innerHTML = '';
  sorted.forEach(p => {
    const el = document.createElement('div');
    el.className = 'player-item' + (selected.has(p.id) ? ' selected' : '');
    el.dataset.id = p.id;
    el.innerHTML = `<span class="player-check">✓</span><span class="player-name">${p.name}</span>`;
    el.addEventListener('click', () => {
      selected.has(p.id) ? selected.delete(p.id) : selected.add(p.id);
      el.classList.toggle('selected', selected.has(p.id));
      updateCount();
    });
    c.appendChild(el);
  });
  updateCount();
}
renderPlayerGrid();

function updateCount() {
  document.getElementById('selCount').textContent = selected.size + guests.length;
}

document.getElementById('clearSelBtn').addEventListener('click', () => {
  selected.clear();
  document.querySelectorAll('.player-item').forEach(el => el.classList.remove('selected'));
  updateCount();
});
document.getElementById('selectAllBtn').addEventListener('click', () => {
  players.forEach(p => selected.add(p.id));
  document.querySelectorAll('.player-item').forEach(el => el.classList.add('selected'));
  updateCount();
});

// ════════ SPLIT ════════
document.getElementById('splitBtn').addEventListener('click', doSplit);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function doSplit() {
  const selPlayers = players.filter(p => selected.has(p.id)).map(p => ({ ...p, isGuest: false }));
  const guestPool  = guests.map(g => ({ name: g.name, tall: g.tall, id: g.id, rank: 3, isGuest: true }));
  let pool = [...selPlayers, ...guestPool];

  const warning = document.getElementById('splitWarning');
  if (pool.length < numTeams) {
    warning.innerHTML = `<div class="alert alert-warn">⚠️ יש לבחור לפחות ${numTeams} שחקנים.</div>`;
    return;
  }
  warning.innerHTML = '';

  const needed = numTeams * perTeam;

  // Bench excess players — shuffle first so bench composition varies each time
  let bench = [];
  if (pool.length > needed) {
    const shuffled = shuffle(pool);
    pool  = shuffled.slice(0, needed);
    bench = shuffled.slice(needed);
  }

  // Actual sizes: each team max perTeam, distribute pool evenly
  const actualSizes = Array(numTeams).fill(0);
  let rem = pool.length;
  for (let i = 0; i < numTeams && rem > 0; i++) {
    const give = Math.min(perTeam, Math.ceil(rem / (numTeams - i)));
    actualSizes[i] = give; rem -= give;
  }

  // Assign dynamic tiers from selected pool only
  const poolSorted = [...pool].sort((a, b) => a.rank - b.rank);
  const n = poolSorted.length;
  const base = Math.floor(n / 4), extra = n % 4;
  const tierSizes = [base, base, base, base];
  for (let i = 0; i < extra; i++) tierSizes[3 - i]++;

  let tiered = []; let idx = 0;
  for (let t = 1; t <= 4; t++) {
    for (let j = 0; j < tierSizes[t - 1]; j++) {
      tiered.push({ ...poolSorted[idx], tier: t }); idx++;
    }
  }

  // Distribute tiers round-robin (randomized), respect actualSizes hard cap
  const teamArrays = Array.from({ length: numTeams }, () => []);
  for (let t = 1; t <= 4; t++) {
    const tier = shuffle(tiered.filter(p => p.tier === t));
    for (const p of tier) {
      let target = -1, minLen = Infinity;
      for (let i = 0; i < numTeams; i++) {
        if (teamArrays[i].length < actualSizes[i] && teamArrays[i].length < minLen) {
          minLen = teamArrays[i].length; target = i;
        }
      }
      if (target !== -1) teamArrays[target].push(p);
    }
  }

  // Balance by score
  balanceTeams(teamArrays, actualSizes);
  // Balance tall
  balanceTall(teamArrays, actualSizes);

  renderTeams(teamArrays, bench);
}

function tierScore(t) { return 5 - t; }
function teamScore(arr) { return arr.reduce((s, p) => s + tierScore(p.tier), 0); }

function balanceTeams(teams, sizes) {
  for (let iter = 0; iter < 60; iter++) {
    let maxS = -Infinity, minS = Infinity, maxI = 0, minI = 0;
    teams.forEach((t, i) => { const s = teamScore(t); if (s > maxS) { maxS = s; maxI = i; } if (s < minS) { minS = s; minI = i; } });
    if (maxS - minS <= 1) break;
    let bestSwap = null, bestDiff = maxS - minS;
    for (let pi = 0; pi < teams[maxI].length; pi++) {
      for (let pj = 0; pj < teams[minI].length; pj++) {
        const pa = teams[maxI][pi], pb = teams[minI][pj];
        if (pa.tier === pb.tier) continue;
        const nd = Math.abs((maxS - tierScore(pa.tier) + tierScore(pb.tier)) - (minS - tierScore(pb.tier) + tierScore(pa.tier)));
        if (nd < bestDiff) { bestDiff = nd; bestSwap = [pi, pj]; }
      }
    }
    if (!bestSwap) break;
    [teams[maxI][bestSwap[0]], teams[minI][bestSwap[1]]] = [teams[minI][bestSwap[1]], teams[maxI][bestSwap[0]]];
  }
}

function balanceTall(teams, sizes) {
  for (let iter = 0; iter < 30; iter++) {
    const tc = teams.map(t => t.filter(p => p.tall).length);
    const max = Math.max(...tc), min = Math.min(...tc);
    if (max - min <= 1) break;
    const maxI = tc.indexOf(max), minI = tc.indexOf(min);
    let swapped = false;
    for (const pa of teams[maxI].filter(p => p.tall)) {
      for (const pb of teams[minI].filter(p => !p.tall)) {
        if (pa.tier === pb.tier) {
          const ai = teams[maxI].indexOf(pa), bi = teams[minI].indexOf(pb);
          [teams[maxI][ai], teams[minI][bi]] = [pb, pa];
          swapped = true; break;
        }
      }
      if (swapped) break;
    }
    if (!swapped) break;
  }
}

const TEAM_NAMES  = ['קבוצה א', 'קבוצה ב', 'קבוצה ג'];
const TEAM_COLORS = ['team-color-a', 'team-color-b', 'team-color-c'];

function renderTeams(teams, bench) {
  const container = document.getElementById('teamsResult');
  container.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'teams-grid';

  teams.forEach((team, ti) => {
    const card = document.createElement('div');
    card.className = `team-card ${TEAM_COLORS[ti]}`;
    card.innerHTML = `
      <div class="team-header"><span class="team-name">${TEAM_NAMES[ti]}</span></div>
      <div class="team-players">
        ${team.map((p, i) => `
          <div class="team-player-row">
            <span class="pnum">${i + 1}</span>
            <span>${p.name}</span>
            ${p.isGuest ? '<span class="extra-tag">מזדמן</span>' : ''}
          </div>`).join('')}
      </div>`;
    grid.appendChild(card);
  });
  container.appendChild(grid);

  if (bench.length > 0) {
    const bc = document.createElement('div');
    bc.className = 'bench-card';
    bc.style.marginTop = '12px';
    bc.innerHTML = `<div class="bench-title">🪑 ספסל (${bench.length} שחקנים עודפים)</div>
      <div class="bench-names">${bench.map(p => `<span class="bench-chip">${p.name}</span>`).join('')}</div>`;
    container.appendChild(bc);
  }

  grid.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
